spring:
  application:
    name: smartsociety
  datasource:
    url: ${DB_URL:jdbc:h2:mem:smartsociety;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}

app:
  mail:
    from: ${MAIL_FROM:no-reply@propertydirect.local}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-a-long-production-value-123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
